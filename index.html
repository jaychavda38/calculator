<html>
<head>
<title> Calculator </title>
	<style>
		body{
			display:flex;
			justify-content:center;
			align-items:center;
		}
		h1{
			color:black;
			font-size:25px;
			text-align:center;
			letter-spacing:8px;
		}
		input{
			background-color:#ffffff;
			color:black;
			text-align:right;
			font-size:25px;
			padding:12px;
			width:100%;
			height:50px;
		}
		button{
			padding:15px 22px;
			font-size:20px;
			border-radius:10%
		}
		button:hover{
			transform:scale(1.05);
		}
		.clear{
			font-weight:bold;
			background-color:#ff3b30;
			color:white; 
		}
		.operator{
			background-color:orange;
			font-weight:bold;
			color:black;
		}
		.number{
			font-weight:bold;
			background-color:grey;
			color:white;
		}
		#calc{
			position:absolute;
			top:40px;
			font-size:25px;
			color:white;
			font-family:georgia;
			text-decoration:underline;
			align:center;
		}
	</style>
</head>
<body style="background-color:black">
			<h1 id="calc"> CALCULATOR </h1>

	
	<table border="3" align="center" style="background-color:darkgrey">
		<tr>
			<th colspan="4"> <h1>CASIO</h1> </th>
		</tr>
		<tr>
			<th colspan="4"> <input type="text" id="show"> </th>
		</tr>
		<tr>
			<td align="center"> 
				<button class="clear" onclick="clearscreen()"> CE </button>
			</td>
			<td align="center"> 
				<button class="operator" onclick="toggleSign()"> +/- </button>
			</td>
			<td align="center"> 
				<button class="operator" onclick="percent()"> % </button>
			</td>
			<td align="center"> 
				<button class="operator" onclick="passval('/')"> / </button>
			</td>
		</tr>
		<tr>
			<td align="center"> 
				<button class="number" onclick="passval('7')"> 7 </button>
			</td>
			<td align="center"> 
				<button class="number" onclick="passval('8')"> 8 </button>
			</td>
			<td align="center"> 
				<button class="number" onclick="passval('9')"> 9 </button>
			</td>
			<td align="center"> 
				<button class="operator" onclick="passval('*')"> * </button>
			</td>
		</tr>
		<tr>
			<td align="center"> 
				<button class="number" onclick="passval('4')"> 4 </button>
			</td>
			<td align="center"> 
				<button class="number" onclick="passval('5')"> 5 </button>
			</td>
			<td align="center"> 
				<button class="number" onclick="passval('6')"> 6 </button>
			</td>
			<td align="center"> 
				<button class="operator" onclick="passval('-')"> - </button>
			</td>
		</tr>
		<tr>
			<td align="center"> 
				<button class="number" onclick="passval('1')"> 1 </button>
			</td>
			<td align="center"> 
				<button class="number" onclick="passval('2')"> 2 </button>
			</td>
			<td align="center"> 
				<button class="number" onclick="passval('3')"> 3 </button>
			</td>
			<td align="center"> 
				<button class="operator" onclick="passval('+')"> + </button>
			</td>
		</tr>
		<tr>
			<td align="center" colspan="2"> 
				<button class="number" onclick="passval('0')"> 0 </button>
			</td>
			<td align="center"> 
				<button class="number" onclick="passval('.')"> . </button>
			</td>
			<td align="center"> 
				<button class="operator" onclick="answer()"> = </button>
			</td>
		</tr>

	<script>
		function passval(value){
			document.getElementById("show").value += value;}
			//+= mtlb je pehla lakhyu hatu ema add kare ex.5 hase ane 3 dabayu to 53 thse
			
		function clearscreen(){
			document.getElementById("show").value = "";}
			
		function answer(){
			var val= document.getElementById("show").value;
			document.getElementById("show").value= eval(val);}
		
		function percent(){
			var val= document.getElementById("show").value;
			document.getElementById("show").value= eval(val)/100;}
		
		function toggleSign(){
			var val= document.getElementById("show").value;
			document.getElementById("show").value= val * -1;}
	</script>
</body>
</html>
